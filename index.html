<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily account of Turk-work</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #10b981;
            --danger: #f43f5e;
            --dark: #0f172a;
            --light: #f8fafc;
            --card-bg: #ffffff;
            --shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.08);
            --radius: 24px;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #eef2f7; 
            margin: 0;
            padding: 0;
            color: var(--dark);
            overflow-x: hidden;
        }

        /* Continuous Animating Top Navbar */
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        nav {
            background: linear-gradient(-45deg, #1e1b4b, #4c1d95, #0f172a, #2563eb);
            background-size: 400% 400%;
            animation: gradientShift 12s ease infinite;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            color: white;
            position: sticky;
            top: 0;
            z-index: 99;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .nav-title {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        /* Upgraded Bigger Live Widget Layout */
        .live-widgets {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(6px);
            padding: 10px 24px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 200px;
            box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
        }
        .widget-clock { 
            color: #38bdf8; 
            font-family: monospace; 
            font-size: 22px; 
            font-weight: 800; 
            letter-spacing: 0.5px;
            line-height: 1.2;
            margin-bottom: 2px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }
        .widget-date { 
            color: #e2e8f0; 
            font-size: 13px; 
            font-weight: 600;
            letter-spacing: 0.2px;
            opacity: 0.9;
        }

        .nav-menu {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-item {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        .nav-item span { font-weight: 800; color: #fbbf24; }

        .nav-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover { background: white; color: var(--dark); }

        .lang-btn {
            background: #fbbf24;
            color: #0f172a;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn:hover { background: #f59e0b; }

        /* Main Layout */
        .container {
            max-width: 1650px;
            margin: 30px auto;
            padding: 0 30px;
        }

        /* Top Progress Loaders Container */
        .tracker-loaders {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .loader-card {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 16px;
            box-shadow: var(--shadow);
        }
        .loader-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 14px;
        }
        .progress-bar-bg { background: #e2e8f0; height: 12px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill {
            height: 100%; width: 0%; border-radius: 10px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: width 0.5s ease-in-out;
        }

        /* Optimized Split Panels Grid */
        .grid {
            display: grid;
            grid-template-columns: 0.9fr 2fr; 
            gap: 35px;
        }
        @media (max-width: 1024px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            padding: 25px; 
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        @keyframes floatPulse {
            0% { transform: translateY(0px) scale(1); box-shadow: 0 10px 20px rgba(99,102,241,0.1); }
            50% { transform: translateY(-5px) scale(1.01); box-shadow: 0 15px 30px rgba(99,102,241,0.2); }
            100% { transform: translateY(0px) scale(1); box-shadow: 0 10px 20px rgba(99,102,241,0.1); }
        }
        .quick-btn {
            width: 100%;
            color: white;
            border: none;
            padding: 22px 15px; 
            border-radius: 18px;
            font-size: 24px;
            font-weight: 900;
            cursor: pointer;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            animation: floatPulse 4s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .quick-btn:nth-child(even) {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            animation-delay: 2s;
        }
        .quick-btn:active { transform: scale(0.97); }
        .quick-btn span.sub { font-size: 12px; font-weight: 500; opacity: 0.8; }

        .submit-all-btn {
            background: #1e293b;
            color: white;
            border: none;
            padding: 10px 18px; 
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-all-btn:hover { background: #0f172a; }

        .panel-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Advanced Scrollable Table CSS Fixing */
        .table-wrapper { 
            border-radius: 16px; 
            border: 1px solid #e2e8f0; 
            overflow: hidden; 
        }
        
        .scroll-container {
            max-height: 420px; 
            overflow-y: auto;
        }

        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; background: white; }
        
        th { 
            background: #f8fafc; 
            color: #64748b; 
            font-weight: 700; 
            font-size: 12px; 
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 10;
            box-shadow: 0 2px 2px -1px rgba(0, 0, 0, 0.05);
        }
        
        td { padding: 16px; border-bottom: 1px solid #f1f5f9; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-danger { background: #fee2e2; color: #991b1b; }

        .remove-btn { background: none; border: none; color: #cbd5e1; font-size: 16px; cursor: pointer; }
        .remove-btn:hover { color: var(--danger); }

        /* Modal System */
        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.5); backdrop-filter: blur(8px); align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: white; padding: 35px; border-radius: var(--radius); width: 90%; max-width: 850px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2); animation: slideUp 0.3s ease; max-height: 85vh; overflow-y: auto;
        }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .close-modal { float: right; font-size: 28px; font-weight: bold; color: #94a3b8; cursor: pointer; }

        .acc-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 20px; background: #f8fafc; border: 1px solid #e2e8f0;
            border-radius: 12px; margin-bottom: 10px;
        }
        .acc-actions { display: flex; gap: 10px; }
        .input-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; margin-bottom: 25px; }
        .input-group input {
            flex: 1; min-width: 120px; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 14px;
        }
        .input-group button {
            background: var(--success); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .cancel-edit-btn { background: #64748b !important; }

        /* Settings Reset Buttons Zone */
        .settings-reset-zone {
            border-top: 2px dashed #e2e8f0;
            padding-top: 20px;
            display: flex;
            gap: 15px;
        }
        .settings-reset-zone button {
            flex: 1;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-clear-run { background: #f1f5f9; color: var(--dark); }
        .btn-clear-run:hover { background: #e2e8f0; }
        .btn-master-reset { background: #fee2e2; color: var(--danger); border-color: #fca5a5 !important; }
        .btn-master-reset:hover { background: #fecaca; }

        /* Calendar Layout */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .calendar-day-name { text-align: center; font-weight: 700; color: #64748b; font-size: 11px; text-transform: uppercase; }
        .calendar-cell { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 8px; min-height: 85px; display: flex; flex-direction: column; justify-content: space-between; }
        .cell-date { font-weight: 700; font-size: 12px; color: #94a3b8; }
        .cell-data { font-size: 11px; display: flex; flex-direction: column; gap: 3px; }
        .cell-badge { padding: 2px 5px; border-radius: 4px; color: white; font-weight: bold; font-size: 10px; text-align: center; background: #6366f1; }
    </style>
</head>
<body>

<!-- Navbar Box -->
<nav>
    <div class="nav-left">
        <div class="nav-title" id="navTitle">তুর্ক-কাজের দৈনিক হিসাব খাতা</div>
        <!-- Upgraded Bigger Vertical Widget Frame -->
        <div class="live-widgets">
            <div class="widget-clock" id="liveClock">00:00:00 AM</div>
            <div class="widget-date" id="liveDate">বৃহস্পতি, ০৯ জুলাই ২০২৬</div>
        </div>
    </div>
    
    <div class="nav-menu">
        <div class="nav-item">Today: <span id="todayTotal">0</span></div>
        <div class="nav-item">Yesterday: <span id="yesterdayTotal">0</span></div>
        
        <button class="nav-btn" onclick="openCalendar()" id="text-nav-cal">📅 Calendar</button>
        <button class="nav-btn" onclick="openSettings()" id="text-nav-settings">⚙️ Manage Accounts</button>

        <button class="lang-btn" id="langBtn" onclick="toggleLanguage()">English</button>
    </div>
</nav>

<div class="container">
    
    <!-- Top Progress Indicators Frame -->
    <div class="tracker-loaders" id="loadersContainer"></div>

    <!-- Interface Main Grid -->
    <div class="grid">
        <!-- Input Frame Box -->
        <div class="card">
            <div class="text-control-title" id="text-control-title" style="font-size: 15px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom:20px;">ক্লিক করে কাজ জমা দিন</div>
            <div id="accountButtonsContainer"></div>
        </div>

        <!-- Scrollable Real-Time Log Spreadsheet Frame -->
        <div class="card">
            <div class="panel-header-flex">
                <div class="card-title" style="margin:0;" id="text-log-title">আজকের রানিং কাজের খাতা</div>
                <button class="submit-all-btn" onclick="submitAllToday()" id="text-submit-all">আজকের পুরো কাজ জমা দিন</button>
            </div>
            
            <div class="table-wrapper">
                <div class="scroll-container">
                    <table>
                        <thead>
                            <tr>
                                <th id="th-date">তারিখ</th>
                                <th id="th-time">সময়</th>
                                <th id="th-acc">অ্যাকাউন্ট নাম</th>
                                <th id="th-count">মোট কাজ (Count)</th>
                                <th id="th-target">টার্গেট হিসেব</th>
                                <th style="text-align: center;" id="th-action">মুছুন</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody">
                            <!-- JS Inject -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Calendar Modal Dashboard -->
<div class="modal" id="calendarModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('calendarModal')">&times;</span>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="modal-calendar-title" style="margin:0;">কাজের ক্যালেন্ডার খাতা</h2>
            <div>
                <button class="nav-btn" style="background:#475569" onclick="changeMonth(-1)">◀</button>
                <span id="calendarMonthYear" style="font-weight: bold; margin: 0 10px;"></span>
                <button class="nav-btn" style="background:#475569" onclick="changeMonth(1)">▶</button>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>
</div>

<!-- Settings Modal Control Panel -->
<div class="modal" id="settingsModal">
    <div class="modal-content" style="max-width: 550px;">
        <span class="close-modal" onclick="closeModal('settingsModal')">&times;</span>
        <h2 id="modal-settings-title" style="margin-top:0; margin-bottom:20px;">অ্যাকাউন্ট ও টার্গেট কন্ট্রোল প্যানেল</h2>
        
        <div id="settingsAccountList"></div>

        <div class="input-group">
            <input type="text" id="newAccountNameInput" placeholder="অ্যাকাউন্ট নাম...">
            <input type="number" id="newAccountTargetInput" placeholder="টার্গেট (Ex: 10)" style="max-width: 120px;">
            <button onclick="saveAccount()" id="text-add-btn">যোগ করুন</button>
            <button onclick="cancelEdit()" id="text-cancel-btn" class="cancel-edit-btn" style="display: none;">বাতিল</button>
        </div>

        <!-- রিসেট অপশন দুটি এখানে এড করা হয়েছে -->
        <div class="settings-reset-zone">
            <button class="btn-clear-run" onclick="clearTodayRunning()" id="text-drop-clear">Clear Running Log</button>
            <button class="btn-master-reset" onclick="clearAllData()" id="text-drop-master">Master Reset (All Data)</button>
        </div>
    </div>
</div>

<script>
    let currentLanguage = 'bn'; 
    let currentCalDate = new Date();
    let editingAccountId = null; 

    const i18n = {
        bn: {
            title: "তুর্ক-কাজের দৈনিক হিসাব খাতা",
            controlTitle: "ক্লিক করে কাজ জমা দিন",
            submitAll: "আজকের পুরো কাজ জমা দিন",
            logTitle: "আজকের রানিং কাজের খাতা",
            thDate: "তারিখ", thTime: "সময়", thAcc: "অ্যাকাউন্ট নাম", thCount: "মোট কাজ", thTarget: "টার্গেট হিসেব", thAction: "মুছুন",
            modalCalTitle: "কাজের ক্যালেন্ডার খাতা",
            modalSetTitle: "অ্যাকাউন্ট ও টার্গেট কন্ট্রোল প্যানেল",
            addBtn: "যোগ করুন",
            saveBtn: "সংরক্ষণ করুন",
            cancelBtn: "বাতিল",
            targetRem: "বাকি", targetDone: "সফল",
            navCal: "📅 ক্যালেন্ডার", navSet: "⚙️ অ্যাকাউন্ট সেটিংস",
            dropClear: "আজকের রানিং ডাটা মুছুন", dropMaster: "মাস্টার রিসেট (সব মুছুন)",
            tapToAdd: "কাজ যোগ করতে চাপুন",
            targetText: "টার্গেট",
            days: ["রবি", "সোম", "মঙ্গল", "বুধ", "বৃহ:", "শুক্র", "শনি"],
            months: ["জানুয়ারী", "ফেব্রুয়ারী", "মার্চ", "এপ্রিল", "মে", "জুন", "জুলাই", "আগস্ট", "সেপ্টেম্বর", "অক্টোবর", "নভেম্বর", "ডিসেম্বর"],
            weekdaysFull: ["রবিবার", "সোমবার", "মঙ্গলবার", "বুধবার", "বৃহস্পতিবার", "শুক্রবার", "শনিবার"],
            digits: {'0':'০','1':'১','2':'২','3':'৩','4':'৪','5':'৫','6':'৬','7':'৭','8':'৮','9':'৯'}
        },
        en: {
            title: "DAILY ACCOUNT OF TURK-WORK",
            controlTitle: "Click to Submit Task",
            submitAll: "Submit Today's All Tasks",
            logTitle: "Today's Running Log Sheet",
            thDate: "Date", thTime: "Time", thAcc: "Account Name", thCount: "Total Count", thTarget: "Target Logic", thAction: "Delete",
            modalCalTitle: "Work Calendar History",
            modalSetTitle: "Account & Target Control Panel",
            addBtn: "Add New",
            saveBtn: "Save Changes",
            cancelBtn: "Cancel",
            targetRem: "Remaining", targetDone: "Success",
            navCal: "📅 Calendar", navSet: "⚙️ Manage Accounts",
            dropClear: "Clear Today's Entries", dropMaster: "Master Reset (Delete All)",
            tapToAdd: "Tap to register +1 task",
            targetText: "Target",
            days: ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"],
            months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"],
            weekdaysFull: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"]
        }
    };

    function translateDigits(str) {
        if (currentLanguage === 'en') return str;
        return str.toString().replace(/[0-9]/g, w => i18n.bn.digits[w]);
    }

    // Live Clock & Widgets Function
    function updateLiveWidgets() {
        const now = new Date();
        
        // Time Formatting
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12;
        hours = hours ? hours : 12; 
        const timeStr = `${String(hours).padStart(2, '0')}:${minutes}:${seconds} ${ampm}`;
        document.getElementById('liveClock').innerText = translateDigits(timeStr);

        // Date Formatting
        const dayName = i18n[currentLanguage].weekdaysFull[now.getDay()];
        const dayDate = now.getDate();
        const monthName = i18n[currentLanguage].months[now.getMonth()];
        const year = now.getFullYear();
        
        let dateStr = "";
        if (currentLanguage === 'bn') {
            dateStr = `${dayName}, ${translateDigits(dayDate)} ${monthName} ${translateDigits(year)}`;
        } else {
            dateStr = `${dayName}, ${monthName} ${dayDate}, ${year}`;
        }
        document.getElementById('liveDate').innerText = dateStr;
    }
    setInterval(updateLiveWidgets, 1000);

    function getAccounts() {
        let accs = JSON.parse(localStorage.getItem('turk_accounts'));
        if (!accs || accs.length === 0) {
            accs = [
                { id: 1, name: 'Ti-Mubasshir', target: 10 },
                { id: 2, name: 'Shourov Hasan', target: 15 }
            ];
            localStorage.setItem('turk_accounts', JSON.stringify(accs));
        }
        return accs;
    }

    window.onload = function() {
        updateLiveWidgets();
        displayData();
    };

    function toggleLanguage() {
        currentLanguage = currentLanguage === 'bn' ? 'en' : 'bn';
        document.getElementById('langBtn').innerText = currentLanguage === 'bn' ? 'English' : 'বাংলা';
        
        const t = i18n[currentLanguage];
        document.getElementById('navTitle').innerText = t.title;
        document.getElementById('text-control-title').innerText = t.controlTitle;
        document.getElementById('text-submit-all').innerText = t.submitAll;
        document.getElementById('text-log-title').innerText = t.logTitle;
        document.getElementById('th-date').innerText = t.thDate;
        document.getElementById('th-time').innerText = t.thTime;
        document.getElementById('th-acc').innerText = t.thAcc;
        document.getElementById('th-count').innerText = t.thCount;
        document.getElementById('th-target').innerText = t.thTarget;
        document.getElementById('th-action').innerText = t.thAction;
        document.getElementById('modal-calendar-title').innerText = t.modalCalTitle;
        document.getElementById('modal-settings-title').innerText = t.modalSetTitle;
        
        updateAddButtonText();
        document.getElementById('text-cancel-btn').innerText = t.cancelBtn;
        document.getElementById('text-nav-cal').innerText = t.navCal;
        document.getElementById('text-nav-settings').innerText = t.navSet;
        document.getElementById('text-drop-clear').innerText = t.dropClear;
        document.getElementById('text-drop-master').innerText = t.dropMaster;

        updateLiveWidgets();
        displayData();
    }

    function updateAddButtonText() {
        const btn = document.getElementById('text-add-btn');
        if (editingAccountId) {
            btn.innerText = i18n[currentLanguage].saveBtn;
            btn.style.background = "var(--primary)";
        } else {
            btn.innerText = i18n[currentLanguage].addBtn;
            btn.style.background = "var(--success)";
        }
    }

    function addQuickTask(accountName) {
        const now = new Date();
        const dateStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        const timeStr = now.toTimeString().substring(0, 5);

        let runningLogs = JSON.parse(localStorage.getItem('runningLogs')) || [];
        runningLogs.push({
            id: now.getTime() + Math.random(),
            date: dateStr,
            time: timeStr,
            account: accountName,
            count: 1
        });

        localStorage.setItem('runningLogs', JSON.stringify(runningLogs));
        displayData();
    }

    function removeTask(id) {
        let runningLogs = JSON.parse(localStorage.getItem('runningLogs')) || [];
        runningLogs = runningLogs.filter(log => log.id !== id);
        localStorage.setItem('runningLogs', JSON.stringify(runningLogs));
        displayData();
    }

    function displayData() {
        const accounts = getAccounts();
        const runningLogs = JSON.parse(localStorage.getItem('runningLogs')) || [];
        const finalLogs = JSON.parse(localStorage.getItem('finalLogs')) || [];
        const allLogs = [...finalLogs, ...runningLogs];

        const now = new Date();
        const todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
        
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        const yesterdayStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');

        let todayNavbarTotal = 0, yesterdayNavbarTotal = 0;
        let todayAccCounts = {};

        accounts.forEach(a => todayAccCounts[a.name] = 0);

        allLogs.forEach(log => {
            if(log.date === todayStr) {
                todayNavbarTotal += log.count;
            }
            if(log.date === yesterdayStr) {
                yesterdayNavbarTotal += log.count;
            }
        });

        runningLogs.forEach(log => {
            if(log.date === todayStr) {
                if(todayAccCounts[log.account] !== undefined) {
                    todayAccCounts[log.account] += log.count;
                }
            }
        });
        
        document.getElementById('todayTotal').innerText = translateDigits(todayNavbarTotal);
        document.getElementById('yesterdayTotal').innerText = translateDigits(yesterdayNavbarTotal);

        // Render Loaders
        const loadersContainer = document.getElementById('loadersContainer');
        loadersContainer.innerHTML = '';
        const tl = i18n[currentLanguage].targetText;

        accounts.forEach(acc => {
            const currentCount = todayAccCounts[acc.name] || 0;
            const myTarget = acc.target || 10;
            const percentage = Math.min(Math.round((currentCount / myTarget) * 100), 100);
            
            const card = document.createElement('div');
            card.className = 'loader-card';
            card.innerHTML = `
                <div class="loader-info">
                    <span>${acc.name}</span>
                    <span style="font-size:12px;">${tl}: ${translateDigits(currentCount)}/${translateDigits(myTarget)} (${translateDigits(percentage)}%)</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                </div>
            `;
            loadersContainer.appendChild(card);
        });

        // Render Action Buttons
        const btnContainer = document.getElementById('accountButtonsContainer');
        btnContainer.innerHTML = '';
        const tapText = i18n[currentLanguage].tapToAdd;

        accounts.forEach(acc => {
            const btn = document.createElement('button');
            btn.className = 'quick-btn';
            btn.onclick = () => addQuickTask(acc.name);
            btn.innerHTML = `
                ${acc.name}
                <span class="sub">${tapText}</span>
            `;
            btnContainer.appendChild(btn);
        });

        // Render Spreadsheet Body
        const tableBody = document.getElementById('logTableBody');
        tableBody.innerHTML = '';

        let cumulativeDayAccCounter = {};
        const t = i18n[currentLanguage];

        runningLogs.forEach(log => {
            const cacheKey = `${log.date}_${log.account}`;
            if(!cumulativeDayAccCounter[cacheKey]) cumulativeDayAccCounter[cacheKey] = 0;
            cumulativeDayAccCounter[cacheKey] += log.count;

            const tr = document.createElement('tr');
            let targetLabel = '';
            const currentCumCount = cumulativeDayAccCounter[cacheKey];
            
            const matchedAcc = accounts.find(a => a.name === log.account);
            const myTarget = matchedAcc ? (matchedAcc.target || 10) : 10;

            if(currentCumCount <= myTarget) {
                let remaining = myTarget - currentCumCount;
                targetLabel = `<span class="badge badge-danger">${translateDigits(myTarget)} - ${translateDigits(currentCumCount)} = ${translateDigits(remaining)} ${t.targetRem}</span>`;
            } else {
                let extra = currentCumCount - myTarget;
                targetLabel = `<span class="badge badge-success">${translateDigits(myTarget)} + ${translateDigits(extra)} = ${translateDigits(currentCumCount)} ${t.targetDone}</span>`;
            }

            tr.innerHTML = `
                <td>${translateDigits(log.date)}</td>
                <td>${translateDigits(log.time)}</td>
                <td><strong>${log.account}</strong></td>
                <td><b style="font-size:15px; color:var(--primary);">${translateDigits(currentCumCount)}</b></td>
                <td>${targetLabel}</td>
                <td style="text-align:center;"><button class="remove-btn" onclick="removeTask(${log.id})">✕</button></td>
            `;
            tableBody.insertBefore(tr, tableBody.firstChild); 
        });
    }

    function submitAllToday() {
        let runningLogs = JSON.parse(localStorage.getItem('runningLogs')) || [];
        if(runningLogs.length === 0) return;

        if(confirm(currentLanguage === 'bn' ? "আজকের সব কাজ ডায়েরিতে সেভ করতে চান? (এটি করার সাথে সাথে টার্গেট বার ০% হয়ে যাবে)" : "Save all running tasks permanently? (This will reset targets back to 0%)")) {
            let finalLogs = JSON.parse(localStorage.getItem('finalLogs')) || [];
            finalLogs = [...finalLogs, ...runningLogs];
            localStorage.setItem('finalLogs', JSON.stringify(finalLogs));
            localStorage.removeItem('runningLogs'); 
            displayData();
        }
    }

    function clearTodayRunning() {
        if(confirm(currentLanguage === 'bn' ? "আজকের রানিং কাজগুলো মুছে দিতে চান?" : "Clear all running entries for today?")) {
            localStorage.removeItem('runningLogs');
            closeModal('settingsModal');
            displayData();
        }
    }

    function clearAllData() {
        if(confirm(currentLanguage === 'bn' ? "সব ডাটা (ক্যালেন্ডার সহ) সম্পূর্ণ মুছে যাবে! আপনি কি নিশ্চিত?" : "Wipe everything including entire history?")) {
            localStorage.clear();
            closeModal('settingsModal');
            displayData();
        }
    }

    function openCalendar() { document.getElementById('calendarModal').style.display = 'flex'; renderCalendar(); }
    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; renderSettings(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; cancelEdit(); }
    function changeMonth(dir) { currentCalDate.setMonth(currentCalDate.getMonth() + dir); renderCalendar(); }

    function renderSettings() {
        const accounts = getAccounts();
        const container = document.getElementById('settingsAccountList');
        container.innerHTML = '';

        accounts.forEach(acc => {
            const div = document.createElement('div');
            div.className = 'acc-item';
            div.innerHTML = `
                <span><strong>${acc.name}</strong> <small style="color:var(--primary); margin-left:10px;">(${i18n[currentLanguage].targetText}: ${translateDigits(acc.target || 10)})</small></span>
                <div class="acc-actions">
                    <button onclick="editAccount(${acc.id}, '${acc.name}', ${acc.target})" style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:bold; margin-right:5px;">📝 ${currentLanguage === 'bn' ? 'সম্পাদন' : 'Edit'}</button>
                    <button onclick="deleteAccount(${acc.id})" style="background:none; border:none; color:var(--danger); cursor:pointer; font-weight:bold;">✕ ${currentLanguage === 'bn' ? 'ডিলিট' : 'Delete'}</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function editAccount(id, name, target) {
        editingAccountId = id;
        document.getElementById('newAccountNameInput').value = name;
        document.getElementById('newAccountTargetInput').value = target;
        document.getElementById('text-cancel-btn').style.display = 'inline-block';
        updateAddButtonText();
    }

    function cancelEdit() {
        editingAccountId = null;
        document.getElementById('newAccountNameInput').value = '';
        document.getElementById('newAccountTargetInput').value = '';
        document.getElementById('text-cancel-btn').style.display = 'none';
        updateAddButtonText();
    }

    function saveAccount() {
        const nameInput = document.getElementById('newAccountNameInput');
        const targetInput = document.getElementById('newAccountTargetInput');
        
        const name = nameInput.value.trim();
        const targetVal = parseInt(targetInput.value) || 10;
        
        if(!name) return;

        let accounts = getAccounts();

        if (editingAccountId) {
            accounts = accounts.map(acc => {
                if(acc.id === editingAccountId) {
                    return { ...acc, name: name, target: targetVal };
                }
                return acc;
            });
            editingAccountId = null;
            document.getElementById('text-cancel-btn').style.display = 'none';
        } else {
            accounts.push({ id: Date.now(), name: name, target: targetVal });
        }
        
        localStorage.setItem('turk_accounts', JSON.stringify(accounts));
        
        nameInput.value = '';
        targetInput.value = '';
        
        updateAddButtonText();
        renderSettings();
        displayData();
    }

    function deleteAccount(id) {
        if(confirm(currentLanguage === 'bn' ? "আপনি কি নিশ্চিতভাবে এই অ্যাকাউন্টটি ডিলিট করতে চান?" : "Are you sure you want to delete this account?")) {
            let accounts = getAccounts();
            accounts = accounts.filter(a => a.id !== id);
            localStorage.setItem('turk_accounts', JSON.stringify(accounts));
            if(editingAccountId === id) cancelEdit();
            renderSettings();
            displayData();
        }
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
        const year = currentCalDate.getFullYear(); const month = currentCalDate.getMonth();
        const t = i18n[currentLanguage];
        document.getElementById('calendarMonthYear').innerText = `${t.months[month]} ${translateDigits(year)}`;

        t.days.forEach(d => {
            const div = document.createElement('div'); div.className = 'calendar-day-name'; div.innerText = d; grid.appendChild(div);
        });

        const firstDay = new Date(year, month, 1).getDay();
        const totalDays = new Date(year, month + 1, 0).getDate();
        const allLogs = [...(JSON.parse(localStorage.getItem('finalLogs')) || []), ...(JSON.parse(localStorage.getItem('runningLogs')) || [])];

        for(let i=0; i<firstDay; i++) grid.appendChild(document.createElement('div'));

        for(let day=1; day<=totalDays; day++) {
            const cDate = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            let daySummary = {};

            allLogs.forEach(l => {
                if(l.date === cDate) {
                    daySummary[l.account] = (daySummary[l.account] || 0) + l.count;
                }
            });

            const cell = document.createElement('div'); cell.className = 'calendar-cell';
            let htmlData = '';
            for(let accName in daySummary) {
                htmlData += `<span class="cell-badge">${accName.substring(0,6)}..: ${translateDigits(daySummary[accName])}</span>`;
            }

            cell.innerHTML = `<div class="cell-date">${translateDigits(day)}</div><div class="cell-data">${htmlData}</div>`;
            grid.appendChild(cell);
        }
    }
</script>
</body>
</html>
