<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turk-Work Pro - Advanced Daily Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #f43f5e;
            --bg-body: #090d16;
            --bg-card: #151c2c;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #26334d;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
            --radius: 18px;
            --nav-bg: linear-gradient(-45deg, #05070f, #0f172a, #1e1b4b, #172554);
        }

        * { box-sizing: border-box; transition: background-color 0.3s, color 0.3s; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            margin: 0;
            padding: 0;
            color: var(--text-main);
            min-height: 100vh;
        }

        nav {
            background: var(--nav-bg);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            flex-wrap: wrap;
            gap: 12px;
        }

        .nav-left { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
        .nav-title { font-size: 20px; font-weight: 800; }

        .live-widgets {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255, 255, 255, 0.1); padding: 6px 16px; border-radius: 12px;
        }
        .widget-clock { color: #38bdf8; font-family: monospace; font-size: 18px; font-weight: 800; }
        .widget-date { color: #cbd5e1; font-size: 11px; font-weight: 600; }

        .nav-menu { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .nav-item { background: rgba(255, 255, 255, 0.1); padding: 6px 12px; border-radius: 10px; font-size: 12px; font-weight: 600; }
        .nav-item span { font-weight: 800; color: #fbbf24; }

        .btn-icon {
            background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 7px 12px; border-radius: 10px; font-weight: 700; font-size: 12px; cursor: pointer;
        }

        .container { max-width: 1600px; margin: 20px auto; padding: 0 20px; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
            padding: 16px; box-shadow: var(--shadow); display: flex; align-items: center; justify-content: space-between;
        }
        .stat-val { font-size: 22px; font-weight: 800; color: var(--primary); }
        .stat-lbl { font-size: 12px; color: var(--text-muted); font-weight: 600; }

        .tracker-loaders { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .loader-card { background: var(--bg-card); border: 1px solid var(--border); padding: 16px; border-radius: var(--radius); }
        .loader-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-weight: 700; font-size: 13px; }
        .progress-bar-bg { background: var(--border); height: 10px; border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; border-radius: 10px; background: linear-gradient(90deg, var(--primary), var(--secondary)); transition: width 0.4s ease; }

        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
        @media (max-width: 992px) { .grid { grid-template-columns: 1fr; } }

        .card { background: var(--bg-card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); }

        .quick-btn {
            width: 100%; color: white; border: none; padding: 16px 12px; border-radius: 14px; font-size: 18px; font-weight: 800;
            cursor: pointer; margin-bottom: 12px; background: linear-gradient(135deg, var(--primary), #4338ca);
            display: flex; flex-direction: column; align-items: center; gap: 4px;
        }

        .btn-action { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; }

        .table-wrapper { border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .scroll-container { max-height: 400px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { background: var(--bg-body); color: var(--text-muted); font-weight: 700; font-size: 11px; padding: 12px 14px; position: sticky; top: 0; }
        td { padding: 12px 14px; border-bottom: 1px solid var(--border); }

        .badge { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
        .badge-success { background: rgba(16, 185, 129, 0.15); color: #10b981; }
        .badge-danger { background: rgba(244, 63, 94, 0.15); color: #f43f5e; }
        .remove-btn { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-card); border: 1px solid var(--border); padding: 24px; border-radius: var(--radius); width: 90%; max-width: 600px; }
        .close-modal { position: absolute; right: 20px; top: 16px; font-size: 24px; cursor: pointer; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .form-control { flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg-body); color: var(--text-main); }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <div class="nav-title">তুর্ক-কাজের দৈনিক হিসাব খাতা</div>
        <div class="live-widgets">
            <div class="widget-clock" id="liveClock">00:00:00 AM</div>
            <div class="widget-date" id="liveDate">বৃহস্পতি, ২৩ জুলাই ২০২৬</div>
        </div>
    </div>
    <div class="nav-menu">
        <div class="nav-item">Today: <span id="todayTotal">0</span></div>
        <button class="btn-icon" onclick="openSettings()">⚙️ Accounts</button>
    </div>
</nav>

<div class="container">
    <div class="stats-row">
        <div class="stat-card">
            <div>
                <div class="stat-lbl">আজকের মোট কাজ</div>
                <div class="stat-val" id="statTodayCount">0</div>
            </div>
            <span style="font-size:28px;">⚡</span>
        </div>
        <div class="stat-card">
            <div>
                <div class="stat-lbl">আজকের আনুমানিক আয়</div>
                <div class="stat-val" id="statTodayEarnings">$0.00</div>
            </div>
            <span style="font-size:28px;">💰</span>
        </div>
    </div>

    <div class="tracker-loaders" id="loadersContainer"></div>

    <div class="grid">
        <div class="card">
            <div style="font-size: 13px; font-weight: 800; color: var(--text-muted); margin-bottom:15px;">ক্লিক করে কাজ জমা দিন</div>
            <div id="accountButtonsContainer"></div>
        </div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <div style="font-weight:800; font-size:16px;">আজকের রানিং কাজের খাতা</div>
                <button class="btn-action" style="background:var(--danger);" onclick="clearTodayRunning()">Clear Today Entries</button>
            </div>
            <div class="table-wrapper">
                <div class="scroll-container">
                    <table>
                        <thead>
                            <tr>
                                <th>তারিখ</th>
                                <th>সময়</th>
                                <th>অ্যাকাউন্ট</th>
                                <th>মোট কাজ</th>
                                <th>টার্গেট</th>
                                <th style="text-align: center;">মুছুন</th>
                            </tr>
                        </thead>
                        <tbody id="logTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal('settingsModal')">&times;</span>
        <h3>অ্যাকাউন্ট ও টার্গেট সেটআপ</h3>
        <div id="settingsAccountList"></div>
        <div class="form-row">
            <input type="text" id="newAccountNameInput" class="form-control" placeholder="অ্যাকাউন্ট নাম...">
            <input type="number" id="newAccountTargetInput" class="form-control" placeholder="টার্গেট (Ex: 10)">
            <input type="number" step="0.01" id="newAccountRateInput" class="form-control" placeholder="গড় মূল্য $ (Ex: 0.30)">
            <button class="btn-action" onclick="saveAccount()">যোগ করুন</button>
        </div>
    </div>
</div>

<script>
    window.addEventListener('storage', () => { displayData(); });

    function updateLiveWidgets() {
        const now = new Date();
        document.getElementById('liveClock').innerText = now.toLocaleTimeString();
        document.getElementById('liveDate').innerText = now.toLocaleDateString('bn-BD', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    }
    setInterval(updateLiveWidgets, 1000);

    function getAccounts() {
        let accs = JSON.parse(localStorage.getItem('turk_accounts'));
        if (!accs || accs.length === 0) {
            accs = [{ id: 1, name: 'Ti-Mubasshir', target: 10, rate: 0.30 }];
            localStorage.setItem('turk_accounts', JSON.stringify(accs));
        }
        return accs;
    }

    function addQuickTask(accountName) {
        const now = new Date();
        const dateStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
        const timeStr = now.toTimeString().substring(0, 5);

        let runningLogs = JSON.parse(localStorage.getItem('runningLogs')) || [];
        runningLogs.push({
            id: now.getTime() + Math.random(),
            date: dateStr,
            time: timeStr,
            account: accountName,
            count: 1
        });

        localStorage.setItem('runningLogs', JSON.stringify(runningLogs));
        displayData();
    }

    function removeTask(id) {
        let runningLogs = JSON.parse(localStorage.getItem('runningLogs')) || [];
        runningLogs = runningLogs.filter(log => log.id !== id);
        localStorage.setItem('runningLogs', JSON.stringify(runningLogs));
        displayData();
    }

    function displayData() {
        const accounts = getAccounts();
        const runningLogs = JSON.parse(localStorage.getItem('runningLogs')) || [];
        const finalLogs = JSON.parse(localStorage.getItem('finalLogs')) || [];
        const allLogs = [...finalLogs, ...runningLogs];

        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

        let todayNavbarTotal = 0, todayEarnings = 0;
        let todayAccCounts = {};
        accounts.forEach(a => todayAccCounts[a.name] = 0);

        allLogs.forEach(log => {
            const matchedAcc = accounts.find(a => a.name === log.account);
            const rate = matchedAcc ? (parseFloat(matchedAcc.rate) || 0) : 0;
            if (log.date === todayStr) {
                todayNavbarTotal += log.count;
                todayEarnings += log.count * rate;
            }
        });

        runningLogs.forEach(log => {
            if (log.date === todayStr && todayAccCounts[log.account] !== undefined) {
                todayAccCounts[log.account] += log.count;
            }
        });

        document.getElementById('todayTotal').innerText = todayNavbarTotal;
        document.getElementById('statTodayCount').innerText = todayNavbarTotal;
        document.getElementById('statTodayEarnings').innerText = `$${todayEarnings.toFixed(2)}`;

        // Render Loaders
        const loadersContainer = document.getElementById('loadersContainer');
        loadersContainer.innerHTML = '';
        accounts.forEach(acc => {
            const currentCount = todayAccCounts[acc.name] || 0;
            const myTarget = acc.target || 10;
            const percentage = Math.min(Math.round((currentCount / myTarget) * 100), 100);

            const card = document.createElement('div');
            card.className = 'loader-card';
            card.innerHTML = `
                <div class="loader-info">
                    <span>${acc.name} ($${acc.rate})</span>
                    <span>${currentCount}/${myTarget} (${percentage}%)</span>
                </div>
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                </div>
            `;
            loadersContainer.appendChild(card);
        });

        // Quick Buttons
        const btnContainer = document.getElementById('accountButtonsContainer');
        btnContainer.innerHTML = '';
        accounts.forEach(acc => {
            const btn = document.createElement('button');
            btn.className = 'quick-btn';
            btn.onclick = () => addQuickTask(acc.name);
            btn.innerHTML = `${acc.name} <span style="font-size:11px; opacity:0.8;">+1 Task</span>`;
            btnContainer.appendChild(btn);
        });

        // Table Logs
        const tableBody = document.getElementById('logTableBody');
        tableBody.innerHTML = '';
        runningLogs.forEach(log => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${log.date}</td>
                <td>${log.time}</td>
                <td><strong>${log.account}</strong></td>
                <td>${log.count}</td>
                <td><span class="badge badge-success">Running</span></td>
                <td style="text-align:center;"><button class="remove-btn" onclick="removeTask(${log.id})">✕</button></td>
            `;
            tableBody.insertBefore(tr, tableBody.firstChild);
        });
    }

    function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; renderSettings(); }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function renderSettings() {
        const accounts = getAccounts();
        const container = document.getElementById('settingsAccountList');
        container.innerHTML = '';
        accounts.forEach(acc => {
            const div = document.createElement('div');
            div.style.cssText = "display:flex; justify-style:space-between; margin-bottom:8px; background:var(--bg-body); padding:8px; border-radius:6px;";
            div.innerHTML = `<span>${acc.name} - Target: ${acc.target} ($${acc.rate})</span>`;
            container.appendChild(div);
        });
    }

    function saveAccount() {
        const name = document.getElementById('newAccountNameInput').value.trim();
        const target = parseInt(document.getElementById('newAccountTargetInput').value) || 10;
        const rate = parseFloat(document.getElementById('newAccountRateInput').value) || 0.3;
        if (!name) return;

        let accounts = getAccounts();
        accounts.push({ id: Date.now(), name, target, rate });
        localStorage.setItem('turk_accounts', JSON.stringify(accounts));
        closeModal('settingsModal');
        displayData();
    }

    function clearTodayRunning() {
        if (confirm("আজকের রানিং ডাটা মুছে ফেলতে চান?")) {
            localStorage.removeItem('runningLogs');
            displayData();
        }
    }

    window.onload = function() {
        updateLiveWidgets();
        displayData();
    };
</script>
</body>
</html>
